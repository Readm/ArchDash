        <style>
            /* 保留必要的覆盖样式 */
            .node-name {
                font-weight: bold;
                margin-bottom: 4px;
                color: var(--text-primary);
            }
            .node-content {
                font-size: 0.9em;
                color: var(--text-secondary);
            }
            .param-menu-btn {
                border: none !important;
                background: transparent !important;
                padding: 2px 6px !important;
                font-size: 12px !important;
                color: var(--text-secondary) !important;
                transition: all 0.2s ease !important;
            }
            .param-menu-btn:hover {
                background: var(--glass-bg) !important;
                color: var(--text-primary) !important;
                border-radius: 3px !important;
            }
            
            /* 节点标题栏加号按钮样式 */
            .add-param-btn:hover {
                background: rgba(0, 123, 255, 0.1) !important;
                color: #007bff !important;
                transform: scale(1.05);
            }
            
            /* 节点菜单按钮悬停样式优化 */
            .node-menu-btn:hover {
                background: rgba(108, 117, 125, 0.1) !important;
                color: #495057 !important;
            }
            
            /* SVG箭头样式 - 美化版 */
            #arrows-overlay {
                pointer-events: none;
                z-index: 10;
            }
            
            #arrows-overlay svg {
                transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            }
            
            /* 流动虚线动画 - 修正方向 */
            @keyframes flow-dash {
                0% {
                    stroke-dashoffset: 20;
                }
                100% {
                    stroke-dashoffset: 0;
                }
            }
            
            /* 脉冲动画 */
            @keyframes pulse-glow {
                0% {
                    opacity: 0.8;
                }
                100% {
                    opacity: 1;
                }
            }
            
            /* 箭头出现动画 */
            @keyframes arrow-appear {
                0% {
                    opacity: 0;
                    stroke-dasharray: 1000;
                    stroke-dashoffset: 1000;
                }
                60% {
                    opacity: 0.8;
                }
                100% {
                    opacity: 1;
                    stroke-dasharray: none;
                    stroke-dashoffset: 0;
                }
            }
            
            /* 美化pin点的悬停效果 */
            .param-pin {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            
            .param-pin:hover {
                transform: scale(1.2);
                background-color: #007bff !important;
            }
            
            .param-pin.active {
                animation: pin-pulse 1.5s ease-in-out infinite;
                background-color: #e74c3c !important;
            }
            
            @keyframes pin-pulse {
                0%, 100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.15);
                }
            }
            
            /* 深色模式下的箭头效果 */
            [data-theme="dark"] #arrows-overlay svg {
                opacity: 0.9;
            }
        </style>

                // 绘制箭头的函数 - 使用SVG路径

        // 监听所有下拉菜单的显示/隐藏事件
        function setupDropdownListeners() {
            // 移除所有现有的监听器
            document.querySelectorAll('.dropdown-toggle').forEach(btn => {
                btn.removeEventListener('click', handleDropdownToggle);
            });
            
            // 添加新的监听器
            document.querySelectorAll('.dropdown-toggle').forEach(btn => {
                btn.addEventListener('click', handleDropdownToggle);
            });
            
            // 监听点击外部区域关闭下拉菜单
            document.addEventListener('click', handleOutsideClick);
        }
        
        function handleDropdownToggle(event) {
            const toggle = event.target.closest('.dropdown-toggle');
            const dropdown = toggle ? toggle.closest('.dropdown') : null;
            const nodeContainer = toggle ? toggle.closest('.node-container') : null;
            
            if (nodeContainer) {
                // 重置所有节点的z-index
                document.querySelectorAll('.node-container').forEach(node => {
                    node.classList.remove('dropdown-active');
                });
                
                // 立即提升当前节点的层级，不等待菜单显示
                nodeContainer.classList.add('dropdown-active');
            }
        }
        
        function handleOutsideClick(event) {
            if (!event.target.closest('.dropdown')) {
                // 如果点击在下拉菜单外部，重置所有节点的z-index
                document.querySelectorAll('.node-container').forEach(node => {
                    node.classList.remove('dropdown-active');
                });
            }
        }
        
        // 初始化监听器
        setupDropdownListeners();
        
        // 使用MutationObserver监听DOM变化，重新设置监听器
        const observer = new MutationObserver(function(mutations) {
            let needsUpdate = false;
            mutations.forEach(function(mutation) {
                if (mutation.type === 'childList') {
                    mutation.addedNodes.forEach(function(node) {
                        if (node.nodeType === 1 && (
                            node.classList.contains('node-container') ||
                            node.querySelector('.dropdown-toggle')
                        )) {
                            needsUpdate = true;
                        }
                    });
                }
            });
            if (needsUpdate) {
                setTimeout(setupDropdownListeners, 100);
            }
        });
        
        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
        
        return window.dash_clientside.no_update;
    }
